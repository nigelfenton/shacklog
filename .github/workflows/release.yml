# ShackLog release workflow.
#
# Trigger:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Builds Windows / Linux / macOS in parallel, then publishes a GitHub
# Release with all three binaries attached.  Manual runs via the Actions
# tab are also supported (workflow_dispatch).
#
# Artifacts produced:
#   ShackLog-<tag>-windows-x64.zip      — extract, run ShackLog.exe
#   ShackLog-<tag>-linux-x86_64.AppImage — chmod +x, run directly
#   ShackLog-<tag>-macos-arm64.dmg      — Apple Silicon only for v0.1

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

env:
  QT_VERSION: '6.8.0'

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: 'qtwebsockets'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Stage and zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($version) -or -not $version.StartsWith("v")) {
              $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          $stage = "ShackLog-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # Top-level runtime files: exe + DLLs deployed by windeployqt.
          Copy-Item build\ShackLog.exe $stage\
          Get-ChildItem build\*.dll | Copy-Item -Destination $stage\
          if (Test-Path build\vc_redist.x64.exe) {
              Copy-Item build\vc_redist.x64.exe $stage\
          }

          # Plugin directories created by windeployqt.
          $pluginDirs = @('platforms','sqldrivers','styles','imageformats',
                          'iconengines','tls','networkinformation','generic')
          foreach ($d in $pluginDirs) {
              if (Test-Path "build\$d") { Copy-Item -Recurse "build\$d" $stage\ }
          }

          Copy-Item README.md $stage\
          Copy-Item LICENSE  $stage\

          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force
          Write-Host "Created $stage.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ShackLog-*-windows-x64.zip
          if-no-files-found: error

  # ── Linux (AppImage) ────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              ninja-build \
              build-essential \
              libgl1-mesa-dev \
              libxkbcommon-dev \
              libxcb-cursor0 \
              libxcb-xinerama0 \
              libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: 'qtwebsockets'
          cache: true

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/ShackLog AppDir/usr/bin/

          cat > AppDir/usr/share/applications/shacklog.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ShackLog
          GenericName=Ham Radio Logbook
          Exec=ShackLog
          Icon=shacklog
          Comment=Standalone ham radio logbook with TCI integration
          Categories=HamRadio;Network;
          Terminal=false
          EOF

          # Placeholder 1×1 transparent PNG — replace with real artwork later.
          # base64 of a 1x1 transparent PNG.
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABAQMAAAAl21bKAAAAA1BMVEUAAACnej3aAAAAAXRSTlMAQObYZgAAAApJREFUeNpjYAAAAAIAAUivpHEAAAAASUVORK5CYII=' \
            | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/shacklog.png

      - name: Build AppImage
        run: |
          # linuxdeploy + qt plugin from upstream continuous releases
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Tell linuxdeploy-plugin-qt where Qt's qmake lives.
          export QMAKE="$Qt6_DIR/bin/qmake"

          ./linuxdeploy-x86_64.AppImage \
              --appdir AppDir \
              --plugin qt \
              --output appimage \
              --desktop-file AppDir/usr/share/applications/shacklog.desktop \
              --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/shacklog.png

          version="${GITHUB_REF_NAME:-dev-${GITHUB_SHA:0:7}}"
          mv ShackLog*.AppImage "ShackLog-${version}-linux-x86_64.AppImage"
          ls -lh ShackLog-*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ShackLog-*-linux-x86_64.AppImage
          if-no-files-found: error

  # ── macOS (Apple Silicon) ───────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: 'qtwebsockets'
          cache: true

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: macdeployqt + DMG
        run: |
          # Bundle Qt frameworks into the .app
          "$Qt6_DIR/bin/macdeployqt" build/ShackLog.app

          version="${GITHUB_REF_NAME:-dev-${GITHUB_SHA:0:7}}"
          dmg_name="ShackLog-${version}-macos-arm64.dmg"

          # Stage with README/LICENSE alongside the .app
          mkdir -p dmg-stage
          cp -R build/ShackLog.app dmg-stage/
          cp README.md LICENSE dmg-stage/

          hdiutil create -volname "ShackLog" \
              -srcfolder dmg-stage \
              -ov -format UDZO \
              "$dmg_name"
          ls -lh "$dmg_name"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ShackLog-*-macos-arm64.dmg
          if-no-files-found: error

  # ── Publish GitHub Release ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.zip' -o -name '*.AppImage' -o -name '*.dmg' \) \
              -exec cp -v {} out/ \;
          ls -lh out/

      - uses: softprops/action-gh-release@v2
        with:
          name: ShackLog ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            out/*.zip
            out/*.AppImage
            out/*.dmg
